name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - name: Build pbiviz package
        run: npx pbiviz package
      - uses: actions/upload-artifact@v4
        with:
          name: pbiviz-package
          path: dist/*.pbiviz
